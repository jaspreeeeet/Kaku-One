steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'server/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mimiclaw-server:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mimiclaw-server:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/mimiclaw-server']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mimiclaw-server'
      - '--image=gcr.io/$PROJECT_ID/mimiclaw-server:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'

images:
  - 'gcr.io/$PROJECT_ID/mimiclaw-server:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mimiclaw-server:latest'
