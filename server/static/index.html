<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MimiClaw · Expression Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🐾 MimiClaw</h1>
    <span id="status-badge" class="badge offline">Connecting…</span>
  </header>

  <main>
    <!-- Live AMOLED preview -->
    <section class="preview-section">
      <div class="amoled-frame">
        <img id="stream-img" src="/stream" alt="Live expression stream"
             onerror="onStreamError()" onload="onStreamLoad()" />
      </div>
      <div class="current-expr-label">
        Current: <strong id="current-expr-name">—</strong>
      </div>
    </section>

    <!-- Expression grid -->
    <section class="controls-section">
      <h2>Expressions</h2>
      <div id="expr-grid" class="expr-grid">
        <!-- Buttons injected by JS -->
      </div>
    </section>

    <!-- Asset uploader -->
    <section class="upload-section">
      <h2>Upload Sprite</h2>
      <form id="upload-form">
        <select id="upload-subfolder" required>
          <option value="">— Select layer —</option>
          <option value="base">base (face)</option>
          <option value="eyes">eyes</option>
          <option value="mouths">mouths</option>
          <option value="extras">extras (blush etc.)</option>
        </select>
        <label class="file-label">
          <input type="file" id="upload-file" accept=".png" required />
          <span id="file-name-label">Choose PNG…</span>
        </label>
        <button type="submit" class="btn primary">Upload</button>
        <span id="upload-status"></span>
      </form>
    </section>

    <!-- Animation tuning -->
    <section class="animation-section">
      <h2>Animation Tuning</h2>
      <form id="animation-form">
        <label>
          Stream FPS
          <input id="anim-stream-fps" type="number" min="1" max="60" step="1" required />
        </label>

        <label>
          Blink min interval (s)
          <input id="anim-blink-min" type="number" min="0.1" max="60" step="0.1" required />
        </label>

        <label>
          Blink max interval (s)
          <input id="anim-blink-max" type="number" min="0.1" max="60" step="0.1" required />
        </label>

        <label>
          Blink duration (frames)
          <input id="anim-blink-duration" type="number" min="1" max="30" step="1" required />
        </label>

        <label>
          Talking cycle (frames)
          <input id="anim-talking-cycle" type="number" min="1" max="30" step="1" required />
        </label>

        <label>
          Transition frames
          <input id="anim-transition" type="number" min="0" max="60" step="1" required />
        </label>

        <div class="animation-actions">
          <button id="anim-save" type="submit" class="btn primary">Apply</button>
          <span id="anim-status"></span>
        </div>
      </form>
    </section>

    <!-- Server info -->
    <section class="info-section">
      <h2>Server Info</h2>
      <table id="info-table">
        <tr><th>Stream URL</th><td><a id="stream-url" href="/stream" target="_blank">/stream</a></td></tr>
        <tr><th>Expression API</th><td><code>POST /expression</code></td></tr>
        <tr><th>Animation API</th><td><code>GET/POST /api/animation</code></td></tr>
        <tr><th>Connected clients</th><td id="info-clients">—</td></tr>
      </table>

      <h3 style="margin-top:1rem">ESP32 CLI command</h3>
      <pre id="cli-hint">set_display_server http://&lt;this-ip&gt;:8000</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
